<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智读笔记 - 智能阅读笔记管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="main-title">智读笔记</h1>
            <p class="header-subtitle">智能分类 · 高效整理</p>
        </header>
        
        <div class="input-section">
            <h2>输入你的读书笔记</h2>
            <textarea id="notes-input" placeholder="阅读的方法
1. 阅读前，思考为什么想要读这本书
2. 阅读时，针对不同的划线，打上不同的标签
  a. #思考：有启发的句子，并附上思考
  b. #金句：经典的句子，可附上思考
  c. #行动：指导行动的内容，并附上场景
  d. #知识：有趣的新知识，可以是概念，也可以是新的认知
3. 阅读后，导出划线内容，整理读书笔记"></textarea>
            <button id="process-btn">分类笔记</button>
            <button id="clear-btn">清空</button>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" data-category="all">全部</button>
            <button class="tab-btn" data-category="思考">思考</button>
            <button class="tab-btn" data-category="知识">知识</button>
            <button class="tab-btn" data-category="行动">行动</button>
            <button class="tab-btn" data-category="金句">金句</button>
            <button class="tab-btn" data-category="仅划线">仅划线</button>
        </div>
        
        <div class="results-section">
            <div id="all" class="category-section active">
                <h2>全部笔记</h2>
                <div class="notes-container" id="all-notes"></div>
            </div>
            <div id="思考" class="category-section">
                <h2>思考</h2>
                <div class="notes-container" id="思考-notes"></div>
            </div>
            <div id="知识" class="category-section">
                <h2>知识</h2>
                <div class="notes-container" id="知识-notes"></div>
            </div>
            <div id="行动" class="category-section">
                <h2>行动</h2>
                <div class="notes-container" id="行动-notes"></div>
            </div>
            <div id="金句" class="category-section">
                <h2>金句</h2>
                <div class="notes-container" id="金句-notes"></div>
            </div>
            <div id="仅划线" class="category-section">
                <h2>仅划线</h2>
                <div class="notes-container" id="仅划线-notes"></div>
            </div>
            <div id="uncategorized" class="category-section">
                <h2>未分类</h2>
                <div class="notes-container" id="uncategorized-notes"></div>
            </div>
        </div>
        
        <footer class="footer">
            <p>&copy; 2025 智读笔记 - 让阅读更有价值</p>
            <p class="author">作者：史前靓仔</p>
        </footer>
    </div>
    

    
    <script src="script.js"></script>
</body>
</html>
